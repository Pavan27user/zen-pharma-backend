name: Reusable — Java Build & Security Gates

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-dir:
        required: true
        type: string
      ecr-repository:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: us-east-1
      needs-database:
        required: false
        type: boolean
        default: false
    outputs:
      image-tag:
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      registry:
        value: ${{ jobs.build-and-push.outputs.registry }}
    secrets:
      AWS_ACCOUNT_ID:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build
        run: cd ${{ inputs.service-dir }} && mvn clean install

      # ✅ FIXED AWS ROLE
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-dev-github-actions-role
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        id: docker-build
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ steps.meta.outputs.image_tag }}"
          cd ${{ inputs.service-dir }}
          docker build -t "$IMAGE" .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Push Image
        run: docker push ${{ steps.docker-build.outputs.image }}